<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de Película - Inception</title>
</head>
<body>

  <!-- Tarjeta de Información de la Película -->
  <div class="movie-card">
    
    <!-- Imagen del Póster -->
    <div class="poster-container">
      <img 
        src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=600&q=80" 
        alt="Póster de la Película" 
        class="poster-image"
      >
    </div>

    <!-- Título y Datos básicos -->
    <h2 class="movie-title">Inception</h2>
    <p class="movie-meta">2010 • CiFi / Acción • 2h 28m</p>

    <!-- Etiquetas (Tags) de valoración y género -->
    <div class="tag-container">
      <div class="movie-tag">
        <span class="star-icon">★</span>
        <span>8.8 / 10</span>
      </div>
      <div class="movie-tag">
        <span>Sci-Fi</span>
      </div>
    </div>

    <!-- Sinopsis corta -->
    <p class="movie-description">
      Un ladrón que roba secretos corporativos a través del uso de la tecnología de intercambio de sueños recibe la tarea inversa de plantar una idea en la mente de un CEO.
    </p>

  </div>

</body>
</html>
